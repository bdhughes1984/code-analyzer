<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GitHub Code Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body { background: #020617; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes countUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  button:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
  button { transition: all .15s ease; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
var e = React.createElement;
var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, useCallback = React.useCallback, Fragment = React.Fragment;

// ─── Constants ────────────────────────────────────────────────────────────────
var GITHUB_API = "https://api.github.com";
var MAX_REPOS = 8;
var MAX_FILES_PER_REPO = 10;
var MAX_FILE_SIZE = 100000;
var ANALYZABLE = new Set([
  "py","js","ts","tsx","jsx","java","c","cpp","h","hpp","cs","go","rs",
  "rb","php","swift","kt","scala","sh","bash","lua","r","m","mm",
  "html","css","vue","svelte","zig","ex","exs","erl","hs","ml","pl","pm","ipynb"
]);

function fext(f) { var p = f.split("."); return p.length > 1 ? p.pop().toLowerCase() : ""; }
function canAnalyze(f) { return ANALYZABLE.has(fext(f)); }

function extractNotebookCode(jsonStr) {
  try {
    var nb = JSON.parse(jsonStr);
    var cells = nb.cells || [];
    var out = [];
    cells.forEach(function(cell) {
      if (cell.cell_type === "code") {
        var src = Array.isArray(cell.source) ? cell.source.join("") : (cell.source || "");
        var trimmed = src.trim();
        if (trimmed && !trimmed.startsWith("!") && !trimmed.startsWith("%")) { out.push(src); out.push(""); }
      }
    });
    return out.join("\n");
  } catch(e) { return null; }
}

// ─── Analysis Engine ──────────────────────────────────────────────────────────

function analyzeCodeQuality(content, filename) {
  var lines = content.split("\n");
  var nonEmpty = lines.filter(function(l) { return l.trim().length > 0; });
  var score = 40, findings = [];

  var funcCount = (content.match(/(?:function\s+\w+|def\s+\w+|fn\s+\w+|\w+\s*=\s*(?:async\s+)?(?:function|\([^)]*\)\s*=>)|\w+\s*\([^)]*\)\s*\{|func\s+\w+|public\s+\w+\s+\w+\s*\()/g) || []).length;
  if (nonEmpty.length > 0 && funcCount > 0) {
    var avg = nonEmpty.length / funcCount;
    if (avg > 60) { score -= 8; findings.push({ type: "warning", msg: "Very long functions (avg >60 lines)" }); }
    else if (avg > 40) { score -= 4; findings.push({ type: "warning", msg: "Long functions (avg >40 lines)" }); }
    else if (avg <= 20) { findings.push({ type: "good", msg: "Well-decomposed functions" }); }
  }

  var singleChar = (content.match(/(?:let|var|const|int|float|double|string|auto)\s+[a-z]\s*[=;,)]/g) || []).length;
  var generic = (content.match(/(?:let|var|const)\s+(?:temp|tmp|data|val|res|ret|obj|arr|str|num|flag)\s*=/g) || []).length;
  if (singleChar > 5) { score -= 5; findings.push({ type: "warning", msg: singleChar + " single-char variable names" }); }
  if (generic > 3) { score -= 3; findings.push({ type: "info", msg: generic + " generic variable names" }); }

  var commentPats = [/^\s*\/\//, /^\s*#(?!!)/, /^\s*\/\*/, /^\s*\*/, /^\s*\*\//, /^\s*"""/, /^\s*'''/, /^\s*--/];
  var commentLines = lines.filter(function(l) { return commentPats.some(function(p) { return p.test(l); }); }).length;
  var ratio = nonEmpty.length > 0 ? commentLines / nonEmpty.length : 0;
  if (ratio < 0.03 && nonEmpty.length > 30) { score -= 4; findings.push({ type: "warning", msg: "Very few comments (" + (ratio * 100).toFixed(1) + "%)" }); }
  else if (ratio >= 0.1 && ratio <= 0.3) { findings.push({ type: "good", msg: "Healthy comment ratio" }); }

  var freq = {};
  nonEmpty.forEach(function(l) { var t = l.trim(); if (t.length > 15) freq[t] = (freq[t] || 0) + 1; });
  var dupes = Object.values(freq).filter(function(c) { return c > 2; }).length;
  if (dupes > 10) { score -= 6; findings.push({ type: "warning", msg: "Significant code duplication" }); }
  else if (dupes > 5) { score -= 3; findings.push({ type: "info", msg: "Some code duplication" }); }

  var maxDepth = 0, curDepth = 0;
  lines.forEach(function(line) {
    curDepth += (line.match(/\{/g) || []).length - (line.match(/\}/g) || []).length;
    if (curDepth > maxDepth) maxDepth = curDepth;
  });
  if (maxDepth > 8) { score -= 6; findings.push({ type: "warning", msg: "Deep nesting (depth " + maxDepth + ")" }); }
  else if (maxDepth > 5) { score -= 3; findings.push({ type: "info", msg: "Moderate nesting (" + maxDepth + ")" }); }
  else if (maxDepth <= 4 && nonEmpty.length > 10) { findings.push({ type: "good", msg: "Clean, shallow nesting" }); }

  if (lines.filter(function(l) { return l.length > 120; }).length > lines.length * 0.2) { score -= 3; findings.push({ type: "info", msg: "Many long lines (>120 chars)" }); }
  var tabs = lines.filter(function(l) { return l.startsWith("\t"); }).length;
  var spaces = lines.filter(function(l) { return /^ {2,}/.test(l); }).length;
  if (tabs > 5 && spaces > 5) { score -= 3; findings.push({ type: "warning", msg: "Mixed tabs and spaces" }); }
  if (nonEmpty.length > 50 && !/try\s*\{|try:|except|catch\s*\(|rescue|recover/.test(content) && !/throw\s|raise\s|panic\(/.test(content)) {
    score -= 3; findings.push({ type: "info", msg: "No error handling detected" });
  } else if (/try\s*\{|try:|except|catch\s*\(/.test(content)) { findings.push({ type: "good", msg: "Error handling present" }); }
  return { score: Math.max(0, score), findings: findings, category: "Code Quality", maxScore: 40 };
}

function analyzePerformance(content) {
  var score = 30, findings = [];
  var nested = (content.match(/(?:for|while)[^{]*\{[^}]*(?:for|while)/gs) || []).length;
  if (nested > 3) { score -= 8; findings.push({ type: "warning", msg: nested + " nested loops (O(n\u00B2)+)" }); }
  else if (nested > 0) { score -= 3; findings.push({ type: "info", msg: nested + " nested loop(s)" }); }
  if (/(?:for|while)[^{]*\{[^}]*(?:for|while)[^{]*\{[^}]*(?:for|while)/gs.test(content)) { score -= 6; findings.push({ type: "warning", msg: "Triple-nested loops (O(n\u00B3))" }); }
  if (/(?:for|while)[^{]*\{[^}]*(?:\+\=\s*["'`]|\.concat\(|string\s*\+)/gs.test(content)) { score -= 4; findings.push({ type: "warning", msg: "String concat in loop" }); }
  var recursive = (content.match(/function\s+(\w+)[^{]*\{[^}]*\1\s*\(/gs) || []).length;
  var hasMemo = /memo|cache|lru_cache|@cache|memoize/.test(content);
  if (recursive > 0 && !hasMemo) { score -= 4; findings.push({ type: "info", msg: "Recursion without memo" }); }
  else if (recursive > 0 && hasMemo) { findings.push({ type: "good", msg: "Memoized recursion" }); }
  [
    { p: /\.indexOf\([^)]+\)\s*!==?\s*-1/g, m: "indexOf for existence check", d: 2 },
    { p: /JSON\.parse\(JSON\.stringify/g, m: "Deep clone via JSON", d: 2 },
    { p: /document\.querySelector.*(?:for|while|forEach)/gs, m: "DOM queries in loops", d: 4 },
    { p: /SELECT\s+\*/gi, m: "SELECT * queries", d: 2 },
    { p: /sleep\s*\(\s*\d+\s*\)|time\.sleep|Thread\.sleep/g, m: "Blocking sleep", d: 3 },
  ].forEach(function(r) { if (r.p.test(content)) { score -= r.d; findings.push({ type: "info", msg: r.m }); } });
  [
    { p: /\bSet\b|\bHashSet\b|\bHashMap\b|\bdict\b|\bunordered_map\b/, m: "Hash-based structures" },
    { p: /async\s+|await\s+|Promise|Future|goroutine|spawn/, m: "Async/concurrent patterns" },
    { p: /lazy|generator|yield|Iterator|stream\(\)/, m: "Lazy evaluation" },
  ].forEach(function(r) { if (r.p.test(content)) findings.push({ type: "good", msg: r.m }); });
  return { score: Math.max(0, score), findings: findings, category: "Runtime Performance", maxScore: 30 };
}

function analyzeMemory(content) {
  var score = 30, findings = [];
  if (/(?:for|while)[^{]*\{[^}]*(?:new\s+\w+\[|malloc|calloc|new\s+Array|new\s+Map|new\s+Set|\[\]\s*=|list\(\)|dict\(\))/gs.test(content)) { score -= 6; findings.push({ type: "warning", msg: "Allocation in loops" }); }
  var opens = /open\(|fopen|createReadStream|new\s+(?:File|Stream|Connection|Socket)|connect\(|\.cursor\(\)/.test(content);
  var closes = /\.close\(|\.dispose\(|\.release\(|\.end\(|\.destroy\(|finally|with\s+open|using\s|defer\s/.test(content);
  if (opens && !closes) { score -= 6; findings.push({ type: "warning", msg: "Resources without cleanup" }); }
  else if (opens && closes) { findings.push({ type: "good", msg: "Resource cleanup present" }); }
  if (/with\s+open|using\s*\(|try-with-resources|defer\s+|unique_ptr|shared_ptr/.test(content)) { findings.push({ type: "good", msg: "RAII/context managers" }); }
  var globals = (content.match(/^(?:var|let)\s+\w+\s*=\s*(?:\[|\{|new\s)/gm) || []).length;
  if (globals > 5) { score -= 4; findings.push({ type: "warning", msg: globals + " global mutables" }); }
  [
    { p: /addEventListener(?!.*removeEventListener)/gs, m: "Event listeners without cleanup", d: 4 },
    { p: /setInterval(?!.*clearInterval)/gs, m: "setInterval without clear", d: 4 },
    { p: /\.subscribe\((?!.*\.unsubscribe)/gs, m: "Subscriptions without unsub", d: 3 },
  ].forEach(function(r) { if (r.p.test(content)) { score -= r.d; findings.push({ type: "warning", msg: r.m }); } });
  if (/readFileSync|read_to_string|readAll|\.read\(\)\s*$|file_get_contents/m.test(content) && !/createReadStream|BufferedReader|StreamReader|chunk|pipe\(/.test(content)) { score -= 3; findings.push({ type: "info", msg: "Full file reads (consider streaming)" }); }
  if (/cache|LRU|memoize|WeakMap|WeakRef|lru_cache|@cache/.test(content)) { findings.push({ type: "good", msg: "Caching patterns" }); }
  return { score: Math.max(0, score), findings: findings, category: "Memory Management", maxScore: 30 };
}

function analyzeFile(content, filename) {
  var q = analyzeCodeQuality(content, filename);
  var p = analyzePerformance(content);
  var m = analyzeMemory(content);
  return { filename: filename, totalScore: q.score + p.score + m.score, categories: [q, p, m], lineCount: content.split("\n").length };
}

// ─── GitHub API ───────────────────────────────────────────────────────────────
var apiCallsUsed = 0;
var apiCallsRemaining = 60;
var ghToken = "";

async function apiFetch(url) {
  apiCallsUsed++;
  var opts = {};
  if (ghToken) opts.headers = { "Authorization": "token " + ghToken, "Accept": "application/vnd.github.v3+json" };
  var r = await fetch(url, opts);
  var rem = r.headers.get("X-RateLimit-Remaining");
  if (rem !== null) apiCallsRemaining = parseInt(rem);
  if (!r.ok) {
    if (r.status === 401) throw new Error("Invalid GitHub token.");
    if (r.status === 403) throw new Error("Rate limit hit (" + apiCallsRemaining + " remaining). " + (ghToken ? "Try later." : "Add a token for 5K/hr."));
    if (r.status === 404) throw new Error("Not found.");
    if (r.status === 409) return null;
    throw new Error("API error: " + r.status);
  }
  return r.json();
}

async function fetchBlob(url) {
  try {
    var d = await apiFetch(url);
    if (!d) return null;
    if (d.encoding === "base64" && d.content) {
      var bytes = Uint8Array.from(atob(d.content.replace(/\n/g, "")), function(c) { return c.charCodeAt(0); });
      return new TextDecoder("utf-8").decode(bytes);
    }
    return d.content || null;
  } catch(err) { return null; }
}

async function getRepoTree(owner, repo) {
  var skip = new Set(["node_modules","vendor","dist","build","__pycache__","venv",".git","target","bin","obj","packages",".next",".nuxt","__tests__","test","tests","docs","doc",".github",".circleci"]);
  var priority = new Set(["py","js","ts","jsx","tsx","java","go","rs","c","cpp","rb","swift","kt"]);
  try {
    var data = await apiFetch(GITHUB_API + "/repos/" + owner + "/" + repo + "/git/trees/HEAD?recursive=1");
    if (!data || !data.tree) return [];
    var files = [];
    for (var i = 0; i < data.tree.length; i++) {
      var item = data.tree[i];
      if (item.type !== "blob" || !canAnalyze(item.path) || item.size > MAX_FILE_SIZE || item.size < 10) continue;
      var parts = item.path.split("/"); var bad = false;
      for (var j = 0; j < parts.length - 1; j++) { if (skip.has(parts[j]) || parts[j].startsWith(".")) { bad = true; break; } }
      if (bad) continue;
      files.push({ name: item.path, sha: item.sha, size: item.size, url: GITHUB_API + "/repos/" + owner + "/" + repo + "/git/blobs/" + item.sha });
    }
    files.sort(function(a, b) {
      var ap = priority.has(fext(a.name)) ? 0 : 1;
      var bp = priority.has(fext(b.name)) ? 0 : 1;
      return ap !== bp ? ap - bp : b.size - a.size;
    });
    return files;
  } catch(err) { return []; }
}

async function fetchAndAnalyze(file) {
  var raw = await fetchBlob(file.url);
  if (!raw) return null;
  var content = raw, fname = file.name;
  if (fext(fname) === "ipynb") {
    content = extractNotebookCode(raw);
    if (!content) return null;
    fname = fname.replace(/\.ipynb$/, ".py");
  }
  if (content.length < 20) return null;
  var result = analyzeFile(content, fname);
  result.filename = file.name;
  return result;
}

// ─── Shared Components ────────────────────────────────────────────────────────

function ScoreGauge(props) {
  var score = props.score, size = props.size || 180;
  var ref = useRef(null);
  useEffect(function() {
    if (!ref.current) return;
    var svg = d3.select(ref.current); svg.selectAll("*").remove();
    var g = svg.attr("width", size).attr("height", size).append("g").attr("transform", "translate(" + size/2 + "," + (size/2+10) + ")");
    var radius = size * 0.38;
    var arc = d3.arc().innerRadius(radius - 14).outerRadius(radius).cornerRadius(7);
    g.append("path").datum({ startAngle: -Math.PI*0.75, endAngle: Math.PI*0.75 }).attr("d", arc).attr("fill", "#1e293b");
    var angle = -Math.PI*0.75 + Math.PI*1.5*(score/100);
    var color = score >= 75 ? "#10b981" : score >= 50 ? "#f59e0b" : score >= 25 ? "#f97316" : "#ef4444";
    g.append("path").datum({ startAngle: -Math.PI*0.75, endAngle: -Math.PI*0.75 }).attr("d", arc).attr("fill", color)
      .transition().duration(1400).ease(d3.easeCubicOut)
      .attrTween("d", function() { var i = d3.interpolate(-Math.PI*0.75, angle); return function(t) { return arc({ startAngle: -Math.PI*0.75, endAngle: i(t) }); }; });
    var txt = g.append("text").attr("text-anchor", "middle").attr("dy", "0.1em").attr("fill", "#f1f5f9").attr("font-size", size*0.22+"px").attr("font-weight", "700").text("0");
    txt.transition().duration(1400).ease(d3.easeCubicOut).tween("text", function() { var i = d3.interpolateRound(0, score); var s = this; return function(t) { s.textContent = i(t); }; });
    g.append("text").attr("text-anchor", "middle").attr("dy", size*0.15+"px").attr("fill", "#94a3b8").attr("font-size", "12px").text("/ 100");
  }, [score, size]);
  return e("svg", { ref: ref });
}

function CatBar(props) {
  var pct = (props.score / props.max) * 100;
  var color = pct >= 75 ? "#10b981" : pct >= 50 ? "#f59e0b" : pct >= 25 ? "#f97316" : "#ef4444";
  return e("div", { style: { marginBottom: props.compact ? 8 : 14 } },
    e("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 4, fontSize: props.compact ? 11 : 13, color: "#cbd5e1" } },
      e("span", null, (props.icon||"") + " " + props.label), e("span", { style: { fontWeight: 600, color: color } }, props.score + "/" + props.max)),
    e("div", { style: { height: props.compact ? 5 : 8, borderRadius: 4, background: "#1e293b", overflow: "hidden" } },
      e("div", { style: { height: "100%", width: pct + "%", background: color, borderRadius: 4, transition: "width 1s ease" } }))
  );
}

function Badge(props) {
  var s = { warning: { bg: "rgba(239,68,68,0.12)", b: "#ef4444", c: "#fca5a5", i: "\u26A0" }, info: { bg: "rgba(59,130,246,0.12)", b: "#3b82f6", c: "#93c5fd", i: "\u2139" }, good: { bg: "rgba(16,185,129,0.12)", b: "#10b981", c: "#6ee7b7", i: "\u2713" } }[props.type] || { bg: "rgba(59,130,246,0.12)", b: "#3b82f6", c: "#93c5fd", i: "\u2139" };
  return e("div", { style: { display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 8px", borderRadius: 6, fontSize: 11, background: s.bg, border: "1px solid " + s.b + "30", color: s.c, margin: "2px 3px 2px 0" } }, s.i + " " + props.msg);
}

function FileCard(props) {
  var r = props.result;
  var open = useState(props.defaultOpen || false);
  var sc = r.totalScore;
  var color = sc >= 75 ? "#10b981" : sc >= 50 ? "#f59e0b" : sc >= 25 ? "#f97316" : "#ef4444";
  return e("div", { style: { background: "#0f172a", border: "1px solid #1e293b", borderRadius: 10, marginBottom: 8, overflow: "hidden" } },
    e("div", { onClick: function() { open[1](!open[0]); }, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", cursor: "pointer", userSelect: "none" } },
      e("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        e("span", { style: { color: "#64748b", fontSize: 10, transform: open[0] ? "rotate(90deg)" : "none", transition: "transform .2s", display: "inline-block" } }, "\u25B6"),
        e("span", { style: { fontFamily: "monospace", fontSize: 12, color: "#e2e8f0" } }, r.filename),
        e("span", { style: { fontSize: 10, color: "#64748b" } }, r.lineCount + " lines")),
      e("span", { style: { fontWeight: 700, fontSize: 14, color: color } }, sc)),
    open[0] ? e("div", { style: { padding: "0 14px 12px", borderTop: "1px solid #1e293b" } },
      r.categories.map(function(cat, i) {
        return e("div", { key: i, style: { marginTop: 10 } },
          e(CatBar, { label: cat.category, score: cat.score, max: cat.maxScore, icon: ["\u2726","\u26A1","\uD83E\uDDE0"][i], compact: true }),
          e("div", { style: { display: "flex", flexWrap: "wrap" } },
            cat.findings.length > 0 ? cat.findings.map(function(f, j) { return e(Badge, { key: j, type: f.type, msg: f.msg }); }) : null));
      })) : null);
}

function grade(s) { return s >= 90 ? "A+" : s >= 80 ? "A" : s >= 70 ? "B+" : s >= 60 ? "B" : s >= 50 ? "C" : s >= 40 ? "D" : "F"; }
function scoreColor(s) { return s >= 75 ? "#10b981" : s >= 50 ? "#f59e0b" : s >= 25 ? "#f97316" : "#ef4444"; }
var medals = ["\uD83E\uDD47", "\uD83E\uDD48", "\uD83E\uDD49"];

// ─── Main App ─────────────────────────────────────────────────────────────────

function App() {
  var st = {
    mode: useState("user"),
    input: useState(""),
    loading: useState(false),
    progress: useState(""),
    error: useState(""),
    results: useState(null),
    leaderboard: useState(null),
    token: useState(""),
    showToken: useState(false),
    includeForks: useState(true),
    expandedDev: useState(null),
  };

  function setS(key, val) { st[key][1](val); }
  function getS(key) { return st[key][0]; }

  // ─── Analyze single user ─────────────────────────────────────────────────────
  var analyzeUser = useCallback(async function(userOverride) {
    var user = (userOverride || getS("input")).trim();
    if (!user) return;
    setS("loading", true); setS("error", ""); setS("results", null); setS("leaderboard", null);
    apiCallsUsed = 0; apiCallsRemaining = getS("token") ? 5000 : 60; ghToken = getS("token");
    setS("progress", "Fetching @" + user + "...");
    try {
      var profile = await apiFetch(GITHUB_API + "/users/" + user);
      var repos = await apiFetch(GITHUB_API + "/users/" + user + "/repos?sort=updated&per_page=30");
      repos = repos.filter(function(r) { return getS("includeForks") || !r.fork; })
        .sort(function(a, b) { return (b.stargazers_count + b.size) - (a.stargazers_count + a.size); })
        .slice(0, ghToken ? MAX_REPOS : 4);
      if (!repos.length) { setS("error", "No repos found." + (!getS("includeForks") ? " Enable 'Include forks'." : "")); setS("loading", false); return; }
      var allFiles = [], repoSums = [];
      for (var ri = 0; ri < repos.length; ri++) {
        var repo = repos[ri];
        setS("progress", "Scanning " + repo.name + " (" + (ri+1) + "/" + repos.length + ") \u2014 " + apiCallsRemaining + " API calls left");
        var tree = await getRepoTree(user, repo.name);
        var maxF = ghToken ? MAX_FILES_PER_REPO : 6;
        tree = tree.slice(0, maxF);
        var repoResults = [];
        for (var fi = 0; fi < tree.length; fi++) {
          if (apiCallsRemaining < 5 && !ghToken) break;
          var result = await fetchAndAnalyze(tree[fi]);
          if (result) { repoResults.push(result); allFiles.push(Object.assign({}, result, { repo: repo.name })); }
        }
        if (repoResults.length > 0) {
          var avg = Math.round(repoResults.reduce(function(s,r){return s+r.totalScore;},0)/repoResults.length);
          repoSums.push({ name: repo.name, score: avg, stars: repo.stargazers_count, files: repoResults.length, language: repo.language });
        }
      }
      if (!allFiles.length) { setS("error", "No analyzable files found."); setS("loading", false); return; }

      // Fetch and analyze all files
      setS("progress", "Analyzing " + tree.length + " files...");
      var analyzedFiles = [];
      for (var fi = 0; fi < tree.length; fi++) {
        if (apiCallsRemaining < 10 && !ghToken) break;
        setS("progress", "Analyzing file " + (fi+1) + "/" + tree.length + " \u2014 " + apiCallsRemaining + " API calls left");
        var result = await fetchAndAnalyze(tree[fi]);
        if (result) analyzedFiles.push(Object.assign({}, result, { path: tree[fi].name }));
      }

      if (!analyzedFiles.length) { setS("error", "No analyzable files found in this repo."); setS("loading", false); return; }

      // For each contributor, get their recent commits to find which files they touched
      setS("progress", "Mapping files to contributors...");
      var devScores = [];
      for (var ci = 0; ci < contributors.length; ci++) {
        var contrib = contributors[ci];
        if (apiCallsRemaining < 5 && !ghToken) break;
        setS("progress", "Checking contributions: " + contrib.login + " (" + (ci+1) + "/" + contributors.length + ")");
        try {
          var commits = await apiFetch(GITHUB_API + "/repos/" + owner + "/" + repo + "/commits?author=" + contrib.login + "&per_page=5");
          if (!commits || !commits.length) continue;
          // Get files touched by this contributor from their recent commits
          var touchedFiles = new Set();
          for (var ki = 0; ki < Math.min(commits.length, 3); ki++) {
            if (apiCallsRemaining < 5 && !ghToken) break;
            try {
              var commitDetail = await apiFetch(GITHUB_API + "/repos/" + owner + "/" + repo + "/commits/" + commits[ki].sha);
              if (commitDetail && commitDetail.files) {
                commitDetail.files.forEach(function(f) { touchedFiles.add(f.filename); });
              }
            } catch(e) {}
          }
          // Match touched files to analyzed files
          var devFiles = analyzedFiles.filter(function(af) { return touchedFiles.has(af.path); });

        avgScore: avgScore, topScore: topScore, bottomScore: bottomScore, totalFiles: analyzedFiles.length

                      e("span", { style: { color: scoreColor(pct), fontWeight: 700 } }, dev.catScores[cat.idx]));
                  })));
            })
          )
        ),

        e("div", { style: { textAlign: "center", padding: 20, color: "#475569", fontSize: 12, borderTop: "1px solid #1e293b" } },
          "Scores based on static analysis of files attributed via recent commit history. Click any row to expand.")

      ) : null,

      // Empty state
      !results && !lb && !loading && !error ? e("div", { style: { textAlign: "center", padding: "80px 20px" } },
        e("div", { style: { fontSize: 64, marginBottom: 16 } }, mode === "user" ? "\u25C6" : "\uD83C\uDFC6"),
        e("h2", { style: { fontSize: 20, fontWeight: 600, color: "#94a3b8", marginBottom: 8 } },
          mode === "user" ? "Enter a GitHub username to begin" : "Enter a repository to build a leaderboard"),
        e("p", { style: { color: "#475569", fontSize: 14, maxWidth: 480, margin: "0 auto", lineHeight: 1.6 } },
          mode === "user"
            ? "Analyzes public repos and produces a score for code quality, performance, and memory management."
            : "Fetches all contributors, maps files to authors via commit history, and stack-ranks developers by code quality score."),
        e("div", { style: { display: "flex", gap: 12, justifyContent: "center", marginTop: 24, flexWrap: "wrap" } },
          (mode === "user" ? ["torvalds", "sindresorhus", "tj"] : ["facebook/react", "vercel/next.js", "pallets/flask"]).map(function(name) {
            return e("button", { key: name, onClick: function() { setS("input", name); },
              style: { padding: "8px 16px", borderRadius: 8, border: "1px solid #1e293b", background: "#0f172a", color: "#6366f1", fontSize: 13, cursor: "pointer", fontWeight: 500 }
            }, mode === "user" ? "Try @" + name : "Try " + name);
          }))
      ) : null
    )
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
